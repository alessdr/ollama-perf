<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Perf | Signal & Pulse</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>OllamaPerf</h2>
            </div>
            <ul class="nav-links">
                <li>
                    <a href="/" class="{{ 'active' if request.path == '/' else '' }}">
                        <i data-lucide="activity"></i> Dashboard
                    </a>
                </li>
                <li>
                    <a href="/models" class="{{ 'active' if request.path == '/models' else '' }}">
                        <i data-lucide="database"></i> Models
                    </a>
                </li>
                <li>
                    <a href="/test" class="{{ 'active' if request.path == '/test' else '' }}">
                        <i data-lucide="zap"></i> Run Test
                    </a>
                </li>
            </ul>

            <!-- System Metrics (Visual Only for now) -->
            <div style="margin-top: auto; padding: 24px; border-top: 1px solid var(--border);">
                <div style="font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px;">System Status</div>
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 0.75rem; color: var(--text-muted);">Ollama Engine</span>
                        <span class="badge success" style="padding: 2px 6px; font-size: 0.6rem;">Online</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 0.75rem; color: var(--text-muted);">API Latency</span>
                        <span style="font-size: 0.75rem; font-family: var(--font-code); color: var(--success);">1.2ms</span>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h1>{% block page_title %}{% endblock %}</h1>
                <div style="display: flex; gap: 12px;">
                    {% block topbar_actions %}{% endblock %}
                </div>
            </header>
            
            <div class="content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
